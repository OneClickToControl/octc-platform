# Ajustar director / ecosistema según el repo (npm en raíz, pnpm workspace, etc.).

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      octc-platform:
        patterns:
          - "@1c2c/*"
      workspace-non-octc:
        patterns:
          - "*"
        exclude-patterns:
          - "@1c2c/*"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-dom"
        update-types:
          - "version-update:semver-major"
