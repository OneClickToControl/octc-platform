# Referencia: copiar a .github/workflows/verify.yml (ajusta ramas, Node y scripts).
# Documentación: templates/governance/ci/README.md
name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: install-signatures-lint-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        # with:
        #   version: 10

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
        # Sin .nvmrc: sustituye por node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        # npm-only: npm ci

      # Consumidores de @1c2c/*: validar firmas en el árbol resuelto (ver docs/security/SUPPLY_CHAIN.md).
      - name: Verify registry signatures (incl. @1c2c/* provenance)
        run: pnpm dlx audit-signatures || npm audit signatures

      - name: Lint
        run: pnpm run lint
        # Monorepo: pnpm exec turbo run lint

      - name: Test
        run: pnpm test --if-present

      - name: Build
        run: pnpm run build
        # Monorepo: pnpm exec turbo run build

      # Si el repo usa @1c2c/agent-templates, descomenta:
      # - name: octc-agents verify
      #   run: pnpm exec octc-agents verify
