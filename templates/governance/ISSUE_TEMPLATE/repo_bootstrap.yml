name: Repo bootstrap
description: Create or adopt a new repo following GOLDEN_PATH
title: "[bootstrap] <repo-name>"
labels: ["bootstrap", "platform"]
body:
  - type: input
    id: repo
    attributes:
      label: Repo name
      description: Kebab-case name as it will appear on GitHub and PORTFOLIO.
      placeholder: "my-product"
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - product
        - acp
        - runtime
        - brand
        - legacy
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Owner
      description: Primary owner handle.
    validations:
      required: true
  - type: dropdown
    id: sensitivity
    attributes:
      label: Data sensitivity
      options:
        - none
        - low
        - high
    validations:
      required: true
  - type: checkboxes
    id: golden-path
    attributes:
      label: Golden path
      description: Check off each step when complete.
      options:
        - label: Repo created under the org on GitHub with branch protection enabled.
        - label: PORTFOLIO updated with the new row.
        - label: Adopted @1c2c/eslint-config + @1c2c/tsconfig + @1c2c/agent-templates.
        - label: Minimum docs/ structure applied (DOCUMENTATION_TREE).
        - label: ACP manifest created and registered (if applicable).
        - label: Sentry projects created per OBSERVABILITY (if applicable).
        - label: verify.yml configured and green.
