name: Bug
description: Report a bug in octc-platform or an @1c2c/* package
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: scope
    attributes:
      label: Scope
      description: Affected repo and/or package.
      placeholder: "octc-platform | @1c2c/eslint-config | template observability/sentry/next"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What fails and what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimum steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, runtime, package or template version, agent runtime if applicable.
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
