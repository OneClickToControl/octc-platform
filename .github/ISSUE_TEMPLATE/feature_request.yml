name: Feature
description: Propose an improvement or new capability
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Problem it solves and why it matters.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Solution sketch. If structural, open an RFC instead of this issue.
    validations:
      required: true
  - type: dropdown
    id: structural
    attributes:
      label: Structural change?
      description: If yes, this issue should become an RFC.
      options:
        - "no"
        - "yes (needs RFC + ADR)"
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact on consumer repos
      description: List of repos that need changes (PORTFOLIO).
    validations:
      required: false
