# Changesets: opens "chore: release packages" PR when pending .changeset/* exist;
# after that PR merges to main, publishes @1c2c/* via npm OIDC.
# Operational truth (reviews, CODEOWNERS, org rules): docs/packages/RELEASE_RUNBOOK.md
name: release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: changesets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify npm CLI supports OIDC Trusted Publishers
        run: |
          NPM_VER=$(npm --version)
          echo "node $(node --version)"
          echo "npm  $NPM_VER"
          MAJOR=$(echo "$NPM_VER" | cut -d. -f1)
          MINOR=$(echo "$NPM_VER" | cut -d. -f2)
          if [ "$MAJOR" -lt 11 ] || { [ "$MAJOR" -eq 11 ] && [ "$MINOR" -lt 5 ]; }; then
            echo "::error::npm $NPM_VER too old for OIDC Trusted Publishers (need >= 11.5.1)"
            exit 1
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm -r build --if-present

      - name: Verify provenance of consumed @1c2c packages
        run: npm audit signatures
        continue-on-error: true

      - name: Create Release Pull Request or Publish
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: pnpm exec changeset publish
          version: pnpm exec changeset version
          commit: "chore: release"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
