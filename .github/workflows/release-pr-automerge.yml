# Mechanical Changesets release PR only — must match ALL of:
#   base: main
#   head: changeset-release/main
#   title: chore: release packages  (exactly; must match release.yml/changesets/action)
#   author: github-actions[bot]
#   not from a fork
#
# Normal PRs (even touching packages/**) never match this shape.
#
# Modes:
#   A) Default: OCTC_RELEASE_MERGE_ENABLED unset/false → squash auto-merge via GITHUB_TOKEN
#      (still needs branch policy: reviews + checks satisfied before GitHub merges).
#   B) Dedicated merge: OCTC_RELEASE_MERGE_ENABLED=true
#      Preferred (default when B): GitHub App via OCTC_RELEASE_MERGE_APP_CLIENT_ID + OCTC_RELEASE_MERGE_APP_PRIVATE_KEY;
#      installation token minted per run by actions/create-github-app-token (short-lived).
#      Only if OCTC_RELEASE_MERGE_CREDENTIAL_MODE=pat: static OCTC_RELEASE_MERGE_TOKEN (transitional; IAM: see IDENTITY_ACCESS.md).
#
# Naming: use App Client ID only (not legacy numeric App ID) — matches create-github-app-token v3 `client-id` input.
#
# Org policy must allow the App bot (or PAT actor) to merge this PR class — the repo cannot grant that.
# See docs/packages/RELEASE_RUNBOOK.md § "GitHub App (camino preferido)".
#
# This workflow does NOT broaden review/CODEOWNERS for other PRs.
name: release-pr-automerge

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]

concurrency:
  group: release-pr-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    name: enable-auto-merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: |
      vars.OCTC_RELEASE_MERGE_ENABLED != 'true' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'changeset-release/main' &&
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.title == 'chore: release packages' &&
      github.event.pull_request.user.login == 'github-actions[bot]'
    steps:
      - name: Enable squash auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ github.event.pull_request.number }}" --auto --squash

  # Preferred: installation access token (≈1h, revoked after job). No long-lived PAT.
  merge-mechanical-pr-github-app:
    name: merge-mechanical-pr-github-app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      vars.OCTC_RELEASE_MERGE_ENABLED == 'true' &&
      vars.OCTC_RELEASE_MERGE_CREDENTIAL_MODE != 'pat' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'changeset-release/main' &&
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.title == 'chore: release packages' &&
      github.event.pull_request.user.login == 'github-actions[bot]'
    steps:
      - name: Require App Client ID variable
        env:
          APP_CLIENT_ID: ${{ vars.OCTC_RELEASE_MERGE_APP_CLIENT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APP_CLIENT_ID}" ]; then
            echo "::error::Set repository variable OCTC_RELEASE_MERGE_APP_CLIENT_ID (GitHub App Client ID). For PAT fallback set OCTC_RELEASE_MERGE_CREDENTIAL_MODE=pat and secret OCTC_RELEASE_MERGE_TOKEN instead."
            exit 1
          fi

      - name: Mint installation token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.OCTC_RELEASE_MERGE_APP_CLIENT_ID }}
          private-key: ${{ secrets.OCTC_RELEASE_MERGE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Wait for checks then squash merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          gh pr checks "$PR" --watch
          gh pr merge "$PR" --squash

  # Second-best: static PAT. Use only if App provisioning is blocked; rotate and scope minimally.
  merge-mechanical-pr-pat-fallback:
    name: merge-mechanical-pr-pat-fallback
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      vars.OCTC_RELEASE_MERGE_ENABLED == 'true' &&
      vars.OCTC_RELEASE_MERGE_CREDENTIAL_MODE == 'pat' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'changeset-release/main' &&
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.title == 'chore: release packages' &&
      github.event.pull_request.user.login == 'github-actions[bot]'
    steps:
      - name: PAT mode is transitional (prefer GitHub App)
        run: |
          echo "::notice::OCTC_RELEASE_MERGE_CREDENTIAL_MODE=pat uses a long-lived token. Prefer App + OCTC_RELEASE_MERGE_APP_CLIENT_ID per docs/governance/IDENTITY_ACCESS.md."

      - name: Require PAT secret
        env:
          TOKEN: ${{ secrets.OCTC_RELEASE_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN}" ]; then
            echo "::error::OCTC_RELEASE_MERGE_CREDENTIAL_MODE=pat requires secret OCTC_RELEASE_MERGE_TOKEN."
            exit 1
          fi

      - name: Wait for checks then squash merge
        env:
          GH_TOKEN: ${{ secrets.OCTC_RELEASE_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          gh pr checks "$PR" --watch
          gh pr merge "$PR" --squash
