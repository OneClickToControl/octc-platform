# Mechanical lane: label `octc/auto-merge` on a non-draft, non-fork PR to `main` after policy is satisfied.
# Uses local reusable (public repo cannot call private octc-platform-internal workflows).
#
# Org vars/secrets: OCTC_RELEASE_MERGE_* — see octc-factory-automerge-reusable.yml header.
name: OCTC factory automerge (labeled)

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: |
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'octc/auto-merge') &&
      github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/octc-factory-automerge-reusable.yml
    secrets: inherit
    with:
      pr-number: ${{ github.event.pull_request.number }}
      merge-strategy: squash-when-green
