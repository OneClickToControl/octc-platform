# Reusable: read ACP manifest → repository_dispatch → octc-platform-internal (octc_acp_sync).
# Call from *-agents with secrets: inherit (OCTC_ACP_DISPATCH_TOKEN or OCTC_PORTFOLIO_DISPATCH_TOKEN).
name: OCTC ACP dispatch (callable)

on:
  workflow_call:
    inputs:
      internal_repo:
        description: "Destination repo (no org prefix)"
        type: string
        required: false
        default: octc-platform-internal
      manifest_path:
        description: "Path to manifest JSON in caller repo"
        type: string
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: repository_dispatch (octc_acp_sync)
        env:
          OCTC_ACP_DISPATCH_TOKEN: ${{ secrets.OCTC_ACP_DISPATCH_TOKEN }}
          OCTC_PORTFOLIO_DISPATCH_TOKEN: ${{ secrets.OCTC_PORTFOLIO_DISPATCH_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INTERNAL_REPO: ${{ inputs.internal_repo }}
          MANIFEST_PATH: ${{ inputs.manifest_path }}
        run: |
          python3 << 'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = (os.environ.get("OCTC_ACP_DISPATCH_TOKEN") or "").strip() or (
              os.environ.get("OCTC_PORTFOLIO_DISPATCH_TOKEN") or ""
          ).strip()
          if not token:
              raise SystemExit(
                  "Missing secret: set OCTC_ACP_DISPATCH_TOKEN (preferred) or "
                  "OCTC_PORTFOLIO_DISPATCH_TOKEN with permission to POST "
                  "../dispatches on the internal repo."
              )

          owner = os.environ["OWNER"]
          internal = os.environ["INTERNAL_REPO"]
          repo_short = os.environ["GITHUB_REPOSITORY"].split("/")[-1]
          path = os.environ["MANIFEST_PATH"]

          with open(path, encoding="utf-8") as f:
              manifest = json.load(f)

          acp_id = manifest.get("id")
          if not acp_id:
              raise SystemExit("manifest.id is required")

          # GitHub API: client_payload allows at most 10 top-level keys.
          # Keep a compact shape: repository + commit + full manifest (SSOT).
          payload = {
              "repository": repo_short,
              "commit": os.environ.get("GITHUB_SHA", "") or "",
              "manifest": manifest,
          }

          body = json.dumps(
              {"event_type": "octc_acp_sync", "client_payload": payload}
          ).encode("utf-8")
          url = f"https://api.github.com/repos/{owner}/{internal}/dispatches"
          req = urllib.request.Request(
              url,
              data=body,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          try:
              urllib.request.urlopen(req, timeout=60)
          except urllib.error.HTTPError as e:
              detail = e.read().decode("utf-8", errors="replace")
              raise SystemExit(
                  f"repository_dispatch failed HTTP {e.code}: {detail}"
              ) from e
          print("dispatch OK →", url, {"repository": repo_short, "acp_id": acp_id})
          PY
