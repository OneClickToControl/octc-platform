name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  structure:
    name: structure-and-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify required top-level docs and templates exist
        shell: bash
        run: |
          set -euo pipefail
          required=(
            README.md
            LICENSE
            CODEOWNERS
            docs/PORTFOLIO.md
            docs/PLATFORM_PLAN.md
            docs/observability/OBSERVABILITY.md
            docs/observability/AGENT_TELEMETRY.md
            docs/observability/SENTRY_PROJECTS.md
            docs/security/SUPPLY_CHAIN.md
            docs/security/AGENT_THREAT_MODEL.md
            docs/finops/LLM_COSTS.md
            docs/governance/GIT.md
            docs/governance/IDENTITY_ACCESS.md
            docs/governance/DEPRECATION.md
            docs/agents/REGISTRY.md
            docs/agents/CONFORMANCE.md
            docs/agents/RUNTIME_SYNC.md
            docs/agents/ORCHESTRATION.md
            docs/agents/EVAL_POLICY.md
            docs/agents/ADOPTION.md
            docs/agents/QUALITY_METRICS.md
            docs/integrations/CATALOG.md
            docs/integrations/PATTERNS.md
            docs/compliance/DATA_CLASSIFICATION.md
            docs/comms/RELEASE_NOTES_TEMPLATE.md
            docs/comms/RFC_TEMPLATE.md
            docs/comms/CHANNELS.md
            docs/ops/DR_BCP.md
            docs/i18n/POLICY.md
            docs/metrics/PLATFORM_SCORECARD.md
            docs/onboarding/PLATFORM_TOUR.md
            CONTRIBUTING.md
            docs/adoption/DOCUMENTATION_TREE.md
            docs/adoption/GOLDEN_PATH.md
            docs/adoption/ADOPTION.md
            docs/adr/INDEX.md
            docs/adr/_TEMPLATE.md
            docs/audit/HISTORY.md
            docs/packages/POLICY.md
            schemas/octc-agent-provider.manifest.v1.json
            templates/agents/CLAUDE.md
            templates/agents/AGENTS.md
            templates/agents/cursor/00-octc-base.mdc
            templates/observability/sentry/README.md
            templates/observability/sentry/next/README.md
            templates/observability/sentry/flutter/README.md
            templates/observability/sentry/python/README.md
            templates/governance/PULL_REQUEST_TEMPLATE.md
            templates/governance/privacy-guard/README.md
            templates/governance/privacy-guard/gitleaks.toml
            templates/governance/privacy-guard/precommit-privacy-check.sh
            templates/governance/privacy-guard/privacy-guard.yml
            templates/governance/ci/README.md
            templates/governance/ci/octc-consumer-verify.yml
            packages/tsconfig/package.json
            packages/tsconfig/base.json
            packages/tsconfig/library.json
            packages/tsconfig/nextjs.json
            packages/eslint-config/package.json
            packages/eslint-config/index.js
            packages/eslint-config/next.js
            packages/eslint-config/library.js
            packages/agent-templates/package.json
            packages/agent-templates/index.mjs
            packages/agent-templates/bin/octc-agents.mjs
            packages/agent-templates/scripts/sync-from-ssot.mjs
            packages/cli/package.json
            packages/cli/bin/octc.mjs
            pnpm-workspace.yaml
            package.json
            .changeset/config.json
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::missing required file"
              missing=1
            fi
          done
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi
          echo "All required files present."

  schema:
    name: validate-acp-schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Validate schema is valid JSON Schema 2020-12
        run: |
          npx --yes ajv-cli@5 compile -s schemas/octc-agent-provider.manifest.v1.json --spec=draft2020

  links:
    name: docs-links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lychee — broken relative links
        uses: lycheeverse/lychee-action@1d97d84f0bc547f7b25f4c2170d87d810dc2fb2c # v2
        with:
          args: --no-progress --offline --include-fragments --max-concurrency 8 'docs/**/*.md' '*.md' 'templates/**/*.md'
          fail: true

  templates:
    name: agent-templates-base-block
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: CLAUDE.md must contain octc:base markers
        run: |
          set -euo pipefail
          for f in templates/agents/CLAUDE.md templates/agents/AGENTS.md; do
            grep -q "<!-- octc:base" "$f" || { echo "::error file=$f::missing octc:base marker"; exit 1; }
            grep -q "<!-- octc:end-base -->" "$f" || { echo "::error file=$f::missing octc:end-base marker"; exit 1; }
            grep -q "<!-- octc:user -->" "$f" || { echo "::error file=$f::missing octc:user marker"; exit 1; }
          done

  agent-templates-drift:
    name: agent-templates-drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Re-sync agent-templates from SSOT
        run: pnpm --filter @1c2c/agent-templates run build

      - name: Run all @1c2c package tests
        run: pnpm test

      - name: Fail if mirrored files diverge from the SSOT
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- \
            packages/agent-templates/templates \
            packages/agent-templates/schemas; then
            echo "::error::packages/agent-templates is out of sync with the SSOT in templates/agents/ and schemas/."
            echo "Run: pnpm --filter @1c2c/agent-templates run build && commit the result."
            exit 1
          fi
